<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Trener Menu Sushi</title>
<meta name="description" content="Trener do zapamiętywania menu rolek i zestawów sushi">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@600;700;800&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">

  <header class="topbar">
    <button class="icon-btn" id="backBtn" aria-label="Powrót do menu" hidden>
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M15 5l-7 7 7 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="topbar__brand" id="topbarBrand">
      <span class="topbar__mark" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="9" stroke="#F7F1E3" stroke-width="1.6"/><path d="M8 12c0-2.2 1.8-4 4-4s4 1.8 4 4-1.8 4-4 4" stroke="#F7F1E3" stroke-width="1.6" stroke-linecap="round"/></svg>
      </span>
      <h1 class="topbar__title">Trener Sushi<span class="topbar__tagline"> — opanuj menu rolek i zestawów</span></h1>
    </div>
    <div class="topbar__actions" id="topbarActions">
      <button class="icon-btn icon-btn--text" id="openVersusBtn" aria-label="Versus — porównanie rolek">
        VS
        <span class="icon-btn__badge" id="versusBadge" hidden>0</span>
      </button>
      <button class="icon-btn" id="openLearnBtn" aria-label="Tryb nauki">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M12 4L2 9l10 5 10-5-10-5z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/><path d="M6 11.5V17c0 1.2 2.7 3 6 3s6-1.8 6-3v-5.5" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/><path d="M21 9v6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
      </button>
    </div>
  </header>

  <main id="viewRoot" class="view-root" tabindex="-1">
    <div class="view menu-panel" id="menuPanel">
      <div class="menu-search-bar">
        <input type="text" id="searchInput" class="search-input" placeholder="Nazwa rolki lub zestawu…" autocomplete="off">
      </div>
      <div class="search-body" id="searchBody"></div>
    </div>
    <div id="learnRoot" hidden></div>
    <div id="versusRoot" hidden></div>
  </main>

</div>

<script src="js/data.js"></script>
<script src="js/fuzzy.js"></script>
<script src="js/groups.js"></script>
<script src="js/ingredientGroups.js"></script>
<script src="js/similarity.js"></script>
<script src="js/render.js"></script>
<script src="js/cards.js"></script>
<script src="js/quiz.js"></script>
<script src="js/setquiz.js"></script>
<script src="js/learn.js"></script>
<script src="js/versus.js"></script>
<script src="js/search.js"></script>
<script src="js/app.js"></script>
</body>
</html>
